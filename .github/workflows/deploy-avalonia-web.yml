name: Deploy Avalonia Web to GitHub Pages

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Install WebAssembly workload
        run: dotnet workload install wasm-tools-net9

      - name: Publish Browser app
        run: dotnet publish ./AvaloniaApplication7.Web/GradeScaleApp.Browser/GradeScaleApp.Browser.csproj -c Release

      - name: Add .nojekyll
        run: touch ./AvaloniaApplication7.Web/GradeScaleApp.Browser/bin/Release/net9.0-browser/publish/wwwroot/.nojekyll

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./AvaloniaApplication7.Web/GradeScaleApp.Browser/bin/Release/net9.0-browser/publish/wwwroot

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

